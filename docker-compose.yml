# ===========================
# BanDoSo API - Docker Compose
# ===========================

services:
  api:
    container_name: bandoso-api
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bandoso-network
    # Uncomment for development with hot reload
    # volumes:
    #   - ./app:/app/app
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  bandoso-network:
    driver: bridge
